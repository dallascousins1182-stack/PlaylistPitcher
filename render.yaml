services:
  - type: web
    name: playlist-pitcher
    runtime: python3
    pythonVersion: 3.11
    buildCommand: rm -rf .venv && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false